# Metadata for the Stryx keyboard shield
# This file enables ZMK Studio support

# Shield information
id: stryx
name: Stryx
version: 1.0.0
author: The ZMK Contributors
description: A split ergonomic keyboard with 62 keys

# Layout configuration
layout:
  matrix:
    rows: 6
    cols: 12

  # Physical layout description
  keys:
    # Row 0 (top row - numbers)
    - { row: 0, col: 0,  x: 0,    y: 0 }
    - { row: 0, col: 1,  x: 1,    y: 0 }
    - { row: 0, col: 2,  x: 2,    y: 0 }
    - { row: 0, col: 3,  x: 3,    y: 0 }
    - { row: 0, col: 4,  x: 4,    y: 0 }
    - { row: 0, col: 5,  x: 5,    y: 0 }
    - { row: 0, col: 6,  x: 7,    y: 0 }
    - { row: 0, col: 7,  x: 8,    y: 0 }
    - { row: 0, col: 8,  x: 9,    y: 0 }
    - { row: 0, col: 9,  x: 10,   y: 0 }
    - { row: 0, col: 10, x: 11,   y: 0 }
    - { row: 0, col: 11, x: 12,   y: 0 }

    # Row 1
    - { row: 1, col: 0,  x: 0,    y: 1 }
    - { row: 1, col: 1,  x: 1,    y: 1 }
    - { row: 1, col: 2,  x: 2,    y: 1 }
    - { row: 1, col: 3,  x: 3,    y: 1 }
    - { row: 1, col: 4,  x: 4,    y: 1 }
    - { row: 1, col: 5,  x: 5,    y: 1 }
    - { row: 1, col: 6,  x: 7,    y: 1 }
    - { row: 1, col: 7,  x: 8,    y: 1 }
    - { row: 1, col: 8,  x: 9,    y: 1 }
    - { row: 1, col: 9,  x: 10,   y: 1 }
    - { row: 1, col: 10, x: 11,   y: 1 }
    - { row: 1, col: 11, x: 12,   y: 1 }

    # Row 2
    - { row: 2, col: 0,  x: 0,    y: 2 }
    - { row: 2, col: 1,  x: 1,    y: 2 }
    - { row: 2, col: 2,  x: 2,    y: 2 }
    - { row: 2, col: 3,  x: 3,    y: 2 }
    - { row: 2, col: 4,  x: 4,    y: 2 }
    - { row: 2, col: 5,  x: 5,    y: 2 }
    - { row: 2, col: 6,  x: 7,    y: 2 }
    - { row: 2, col: 7,  x: 8,    y: 2 }
    - { row: 2, col: 8,  x: 9,    y: 2 }
    - { row: 2, col: 9,  x: 10,   y: 2 }
    - { row: 2, col: 10, x: 11,   y: 2 }
    - { row: 2, col: 11, x: 12,   y: 2 }

    # Row 3
    - { row: 3, col: 0,  x: 0,    y: 3 }
    - { row: 3, col: 1,  x: 1,    y: 3 }
    - { row: 3, col: 2,  x: 2,    y: 3 }
    - { row: 3, col: 3,  x: 3,    y: 3 }
    - { row: 3, col: 4,  x: 4,    y: 3 }
    - { row: 3, col: 5,  x: 5,    y: 3 }
    - { row: 3, col: 6,  x: 7,    y: 3 }
    - { row: 3, col: 7,  x: 8,    y: 3 }
    - { row: 3, col: 8,  x: 9,    y: 3 }
    - { row: 3, col: 9,  x: 10,   y: 3 }
    - { row: 3, col: 10, x: 11,   y: 3 }
    - { row: 3, col: 11, x: 12,   y: 3 }

    # Row 4 (thumb cluster row 1)
    - { row: 4, col: 1,  x: 1,    y: 4 }
    - { row: 4, col: 2,  x: 2,    y: 4 }
    - { row: 4, col: 3,  x: 3,    y: 4 }
    - { row: 4, col: 4,  x: 4,    y: 4 }
    - { row: 4, col: 5,  x: 5,    y: 4 }
    - { row: 4, col: 6,  x: 7,    y: 4 }
    - { row: 4, col: 7,  x: 8,    y: 4 }
    - { row: 4, col: 8,  x: 9,    y: 4 }
    - { row: 4, col: 9,  x: 10,   y: 4 }
    - { row: 4, col: 10, x: 11,   y: 4 }

    # Row 5 (thumb cluster row 2)
    - { row: 5, col: 3,  x: 3,    y: 5 }
    - { row: 5, col: 4,  x: 4,    y: 5 }
    - { row: 5, col: 5,  x: 5,    y: 5 }
    - { row: 5, col: 6,  x: 7,    y: 5 }
    - { row: 5, col: 7,  x: 8,    y: 5 }
    - { row: 5, col: 8,  x: 9,    y: 5 }

# Layer names for ZMK Studio
layers:
  - name: "Dvorak"
    id: 0
  - name: "QWERTY"
    id: 1
  - name: "Symbols"
    id: 2
  - name: "Numbers/F-Keys"
    id: 3

# Features supported by this shield
features:
  - keys
  - display
  - underglow
  - bluetooth
  - usb

# Hardware components
hardware:
  displays:
    - type: nice_view
      position: left

  microcontroller:
    type: pro_micro
    compatible:
      - nice_nano_v2
      - nice_nano
      - pro_micro

# Build configuration
build:
  split: true
  split_type: serial
  siblings:
    - stryx_left
    - stryx_right